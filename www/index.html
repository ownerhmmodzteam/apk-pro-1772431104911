<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Project</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/sf-pro-display">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.8);
            --ios-blue: #007aff;
            --ios-text: #000000;
            --ios-sec: #8e8e93;
            --blur: saturate(180%) blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at top right, #d1d1f7, #f2f2f7);
            color: var(--ios-text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 40px 20px 15px;
            background: rgba(242, 242, 247, 0.7);
            backdrop-filter: var(--blur);
            z-index: 100;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Card Section */
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-sec);
            margin: 0 0 8px 15px;
            font-weight: 500;
        }

        .ios-list {
            background: var(--ios-card);
            backdrop-filter: var(--blur);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 0.5px solid rgba(0,0,0,0.05);
        }

        .ios-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .ios-item:last-child { border-bottom: none; }
        .ios-item:active { background: rgba(0,0,0,0.05); }

        .icon-box {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 16px;
        }

        .label { flex: 1; font-size: 17px; font-weight: 400; }
        .value { color: var(--ios-sec); font-size: 17px; margin-right: 5px; }
        .chevron { color: #c4c4c6; font-size: 14px; }

        .btn-ios {
            display: block;
            width: 100%;
            background: var(--ios-blue);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-ios:active { opacity: 0.7; }

        .footer-note {
            text-align: center;
            font-size: 13px;
            color: var(--ios-sec);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Testing Apps</h1>
    </div>

    <div class="container">
        
        <p class="section-title">Koneksi & Jaringan</p>
        <div class="ios-list">
            <div class="ios-item">
                <div class="icon-box" style="background: #ff9500;"><i class="fas fa-wifi"></i></div>
                <div class="label">Wi-Fi</div>
                <div class="value">hmmodz.net</div>
                <i class="fas fa-chevron-right chevron"></i>
            </div>
            <div class="ios-item">
                <div class="icon-box" style="background: #34c759;"><i class="fas fa-bluetooth-b"></i></div>
                <div class="label">Bluetooth</div>
                <div class="value">Nyala</div>
                <i class="fas fa-chevron-right chevron"></i>
            </div>
        </div>

        <p class="section-title">Akun</p>
        <div class="ios-list">
            <div class="ios-item">
                <div class="icon-box" style="background: #007aff;"><i class="fas fa-user"></i></div>
                <div class="label">Profil Pengguna</div>
                <i class="fas fa-chevron-right chevron"></i>
            </div>
            <div class="ios-item">
                <div class="icon-box" style="background: #ff3b30;"><i class="fas fa-shield-halved"></i></div>
                <div class="label">Keamanan</div>
                <i class="fas fa-chevron-right chevron"></i>
            </div>
        </div>

        <button class="btn-ios" onclick="alert('Siap Tuan!')">Simpan Perubahan</button>
        
        <p class="footer-note">Dibuat Untuk Test Apps Saja</p>

    </div>

</body>
</html>
